<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Kingdom – Vote</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="page--vote">
  <main class="screen screen--vote" id="screen-vote">

    <header class="vote-header">
      <button class="back-btn" id="back-btn" aria-label="Voltar ao início">←</button>
      <div class="progress-bar-wrap" id="progress-bar-wrap" role="progressbar" aria-label="Progresso" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <span class="progress-text" id="progress-text" aria-live="polite">1 / 37</span>
      <button class="nav-toggle" id="nav-toggle" aria-label="Ver lista de atrações" aria-expanded="false">≡</button>
    </header>

    <div class="card-stack" id="card-stack" aria-label="Atrações para avaliar">
      <!-- Cards rendered by JS -->
    </div>

    <div class="vote-actions" role="group" aria-label="Avaliar atração">
      <button class="action-btn action-btn--skip" id="btn-skip" aria-label="Pular esta atração">
        <span class="action-icon" aria-hidden="true">✕</span>
        <span class="action-label">Pular</span>
      </button>
      <button class="action-btn action-btn--superlike" id="btn-superlike" aria-label="Marcar como imperdível">
        <span class="action-icon" aria-hidden="true">★</span>
        <span class="action-label">Imperdível!</span>
      </button>
      <button class="action-btn action-btn--like" id="btn-like" aria-label="Curtir esta atração">
        <span class="action-icon" aria-hidden="true">♥</span>
        <span class="action-label">Curtir</span>
      </button>
    </div>

    <!-- Navigation panel — slides down over the card area -->
    <div class="nav-panel" id="nav-panel" hidden>
      <div class="nav-panel__header">
        <span class="nav-panel__title">Todas as Atrações</span>
        <button class="nav-panel__close" id="nav-close" aria-label="Fechar lista">✕</button>
      </div>
      <div class="nav-panel__list" id="nav-list" role="list"></div>
    </div>
    <!-- Transparent backdrop — clicking it closes the panel -->
    <div class="nav-backdrop" id="nav-backdrop" hidden></div>

  </main>

  <script src="js/data.js"></script>
  <script src="js/vote.js"></script>
</body>
</html>
