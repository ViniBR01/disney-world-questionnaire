<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Kingdom – Avaliador de Atrações</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <main class="screen screen--name" id="screen-name">
    <div class="hero hero--photo">
      <img class="hero__bg" src="assets/photos/magic_kingdom/01.jpg" alt="Magic Kingdom – Castelo da Cinderela">
      <div class="hero__overlay" aria-hidden="true"></div>
      <div class="hero__content">
        <h1 class="hero__title">Magic Kingdom</h1>
        <p class="hero__subtitle">Avaliador de Atrações</p>
      </div>
    </div>

    <p class="intro">
      Avalie todas as atrações, shows e desfiles e nos diga o que você mais quer fazer.
      Vamos usar as respostas de todo mundo para planejar o dia perfeito!
    </p>

    <form id="name-form" class="name-form" novalidate>
      <div class="form-group">
        <label for="voter-name">Seu nome <span class="optional">(opcional)</span></label>
        <input
          type="text"
          id="voter-name"
          name="voter-name"
          placeholder="Ex: Vovó Ana"
          autocomplete="given-name"
          maxlength="50"
        >
      </div>
      <button type="submit" class="btn btn--primary" id="start-btn">
        Vamos lá! →
      </button>
    </form>
  </main>

  <script src="js/index.js"></script>
</body>
</html>
